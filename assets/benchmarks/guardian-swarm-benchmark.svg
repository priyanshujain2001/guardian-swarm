<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <rect width="900" height="420" fill="#0f172a"/>
  <g fill="#f8fafc">
    <text x="60" y="45" font-size="24" font-family="Arial, sans-serif">Guardian Swarm benchmark snapshot</text>
    <text x="60" y="78" font-size="14" font-family="Arial, sans-serif">Illustrative comparison of change churn, hotspot risk, and readability in a guided review workflow</text>
  </g>
  <g stroke="#334155" stroke-width="1">
    <line x1="80" y1="340" x2="820" y2="340"/>
    <line x1="80" y1="340" x2="80" y2="120"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">
    <text x="35" y="344">0%</text>
    <text x="25" y="280">25%</text>
    <text x="25" y="220">50%</text>
    <text x="25" y="160">75%</text>
    <text x="25" y="120">100%</text>
  </g>
  <g>
    <rect x="140" y="232" width="110" height="108" fill="#38bdf8"/>
    <rect x="340" y="196" width="110" height="144" fill="#22c55e"/>
    <rect x="540" y="174" width="110" height="166" fill="#a78bfa"/>
    <rect x="740" y="156" width="110" height="184" fill="#f59e0b"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="14" fill="#f8fafc">
    <text x="165" y="362">File churn</text>
    <text x="365" y="362">Security hotspots</text>
    <text x="565" y="362">Readability</text>
    <text x="765" y="362">Diff size</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">
    <text x="160" y="226">~70% lower</text>
    <text x="360" y="190">~40% lower</text>
    <text x="560" y="168">~25% better</text>
    <text x="760" y="150">~35% smaller</text>
  </g>
</svg>